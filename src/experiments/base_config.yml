model_params:
  backbone_fau: swin_transformer_tiny
  num_frames: 32
  au_ckpt_path: ./src/backbones/MEGraphAU/checkpoints/MEFARG_swin_tiny_BP4D_fold1.pth
  phys_ckpt_path: ./src/backbones/rPPGToolbox/final_model_release/PURE_PhysNet_DiffNormalized.pth
  num_classes: 2
  dropout: 0.3
  num_au_classes: 12
  embed_dim: 512
  num_queries: 32
  num_decoder_layers: 6
  nhead: 8
  full_train: true
  # Auxiliary heads (0 = disabled; set > 0 to enable the head)
  num_gender_classes: 0
  num_ethnicity_classes: 0
  num_emotion_classes: 0

train_params:
  lr: 0.0001
  weight_decay: 0.05
  T_max: 100
  num_classes: 2
  # Loss weights for auxiliary multi-task heads (only used when the head is enabled)
  gender_loss_weight: 0.3
  ethnicity_loss_weight: 0.3
  emotion_loss_weight: 0.3
  # Metric learning on the fused embedding (works well with tiny batches via memory bank).
  metric_loss_type: triplet      # triplet | supcon | none
  metric_loss_weight: 0.2
  triplet_margin: 0.3
  supcon_temperature: 0.1
  memory_bank_size: 256          # FIFO of past embeddings; 0 disables
  # Dump per-epoch (clip-level) embeddings + FAU/rPPG features + labels for analysis.
  # Each train __getitem__ returns one random clip; across epochs the same video
  # contributes different clips. Set to null to disable.
  embeddings_dump_dir: ./dumps/embeddings

trainer_params:
  max_epochs: 1000
  accumulate_grad_batches: 2
  accelerator: gpu
  devices: 4
  num_nodes: 1
