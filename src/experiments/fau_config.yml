model_params:
  backbone_fau: swin_transformer_tiny
  num_frames: 32
  au_ckpt_path: ./src/backbones/MEGraphAU/checkpoints/MEFARG_swin_tiny_BP4D_fold1.pth
  num_classes: 2
  dropout: 0.3
  num_au_classes: 12
  embed_dim: 512
  full_train: true

train_params:
  lr: 0.0001
  encoder_lr: 0.00001
  weight_decay: 0.05
  T_max: 100
  num_classes: 2

trainer_params:
  max_epochs: 1000
  accumulate_grad_batches: 2
  accelerator: auto
