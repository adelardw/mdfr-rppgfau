model_params:
  backbone_fau: swin_transformer_tiny
  num_frames: 32
  au_ckpt_path: ./src/backbones/MEGraphAU/checkpoints/MEFARG_swin_tiny_BP4D_fold1.pth
  phys_ckpt_path: ./src/backbones/rPPGToolbox/final_model_release/PURE_PhysNet_DiffNormalized.pth
  num_classes: 2
  dropout: 0.3
  num_au_classes: 12
  embed_dim: 512
  num_queries: 32
  num_decoder_layers: 6
  nhead: 8
  full_train: true
  # Auxiliary heads — actual class counts from train_meta_v5.csv
  # gender:    Male / Female                                          → 2
  # ethnicity: Asian / Black / Indian / Latino or Middle Eastern / White → 5
  # emotion:   Anger / Contempt / Disgust / Fear / Happiness / Neutral / Sadness / Surprise → 8
  num_gender_classes: 2
  num_ethnicity_classes: 5
  num_emotion_classes: 8

train_params:
  lr: 0.0001
  weight_decay: 0.05
  T_max: 100
  num_classes: 2
  gender_loss_weight: 0.3
  ethnicity_loss_weight: 0.3
  emotion_loss_weight: 0.3

trainer_params:
  max_epochs: 1000
  accumulate_grad_batches: 2
  accelerator: auto
